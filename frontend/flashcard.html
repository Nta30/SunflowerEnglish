<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard | Sunflower English</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/flashcard.css" />
  </head>
  <body>
    <div data-component="navbar"></div>
    <div data-component="auth_modal"></div>
    <div data-component="toast"></div>

    <main class="flashcard-main">
      <div id="deckListView">
        <div class="deck-header">
          <h1>Vườn Từ Vựng 🪴</h1>
          <button class="btn-primary" id="openNewDeckModalBtn">
            Gieo hạt mới 🌱
          </button>
        </div>
        <div class="deck-grid" id="deckGrid"></div>
      </div>

      <div id="deckDetailView" style="display: none">
        <div class="detail-header">
          <button class="btn-login" id="backFromDetailBtn">
            🔙 Quay lại vườn
          </button>
          <div class="detail-actions">
            <button class="btn-login" id="openNewCardModalBtn">
              Thêm từ mới ➕
            </button>
            <button class="btn-primary" id="startStudyBtn">
              Bắt đầu học 🚀
            </button>
          </div>
        </div>
        <div class="detail-title-section">
          <h2 id="detailDeckIcon"></h2>
          <h2 id="detailDeckTitle"></h2>
        </div>
        <div class="card-list" id="cardList"></div>
      </div>

      <div id="studyView" style="display: none">
        <div class="study-header">
          <button class="btn-login" id="backToDetailBtn">🔙 Dừng học</button>
          <h2 id="currentDeckTitle"></h2>
          <span class="progress-text" id="studyProgress"></span>
        </div>

        <div class="study-container">
          <div class="flashcard-container">
            <div class="flashcard" id="studyCard">
              <div class="card-face card-front">
                <h3 id="frontWord"></h3>
                <p class="click-hint">Click để lật thẻ 👆</p>
              </div>
              <div class="card-face card-back">
                <h3 id="backWord"></h3>
                <p class="phonetic" id="backPhonetic"></p>
                <p class="example" id="backExample"></p>
              </div>
            </div>
          </div>

          <div class="study-controls">
            <button class="btn-mem btn-forget" id="btnForget">Quên 🥀</button>
            <button class="btn-mem btn-hard" id="btnHard">Hơi nhớ 🌿</button>
            <button class="btn-mem btn-easy" id="btnEasy">Đã thuộc 🌻</button>
          </div>
        </div>
      </div>
    </main>

    <div id="newDeckModal" class="modal-overlay">
      <div class="modal-content admin-modal">
        <span class="close-btn" id="closeDeckModalBtn">&times;</span>
        <div class="modal-header">
          <h2>Tạo chậu cây mới 🌱</h2>
        </div>
        <form id="newDeckForm" class="auth-form">
          <div class="modal-form-group">
            <label class="modal-label">Tên bộ từ vựng</label>
            <input
              type="text"
              id="deckTitleInput"
              class="modal-input"
              placeholder="Ví dụ: Từ vựng TOEIC Part 5..."
              required
            />
          </div>
          <div class="modal-form-group-lg">
            <label class="modal-label">Icon (Emoji)</label>
            <input
              type="text"
              id="deckIconInput"
              class="modal-input"
              value="🪴"
              required
              style="font-size: 20px;"
            />
          </div>
          <button type="submit" class="btn-primary w-100">
            Gieo hạt ngay
          </button>
        </form>
      </div>
    </div>

    <div id="newCardModal" class="modal-overlay">
      <div class="modal-content admin-modal">
        <span class="close-btn" id="closeCardModalBtn">&times;</span>
        <div class="modal-header">
          <h2>Thêm từ vựng mới 📝</h2>
        </div>
        <form id="newCardForm" class="auth-form">
          <div class="modal-form-group">
            <label class="modal-label">Từ vựng (Tiếng Anh)</label>
            <input
              type="text"
              id="cardFrontInput"
              class="modal-input"
              required
            />
          </div>
          <div class="modal-form-group">
            <label class="modal-label">Nghĩa (Tiếng Việt)</label>
            <input
              type="text"
              id="cardBackInput"
              class="modal-input"
              required
            />
          </div>
          <div class="modal-form-group">
            <label class="modal-label">Phiên âm (Tùy chọn)</label>
            <input
              type="text"
              id="cardPhoneticInput"
              class="modal-input"
              placeholder="/.../"
            />
          </div>
          <div class="modal-form-group-lg">
            <label class="modal-label">Ví dụ (Tùy chọn)</label>
            <input
              type="text"
              id="cardExampleInput"
              class="modal-input"
            />
          </div>
          <button type="submit" class="btn-primary w-100">
            Lưu thẻ bài
          </button>
        </form>
      </div>
    </div>

    <script type="module" src="./js/flashcard.js"></script>
  </body>
</html>
